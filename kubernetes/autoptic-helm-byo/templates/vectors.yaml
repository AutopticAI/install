{{- if .Values.vectors.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vectors-embedding
  namespace: {{ .Values.namespace.name }}
  labels:
    app: myapp
    component: vectors-embedding
    {{- include "vectors-helm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.vectors.replicas }}
  selector:
    matchLabels:
      app: myapp
      component: vectors-embedding
  template:
    metadata:
      labels:
        app: myapp
        component: vectors-embedding
        {{- include "vectors-helm.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.vectors.securityContext | nindent 8 }}
      containers:
      - name: vectors-embedding
        image: {{ .Values.vectors.image | quote }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.vectors.containerSecurityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.vectors.resources | nindent 10 }}
        ports:
        - containerPort: 8000
          name: http
        env:
        {{- $namespace := .Values.namespace.name }}
        {{- $metricsPort := (.Values.metrics.service.ports.http | default 6333 | toString) }}
        {{- $qdrantUrl := printf "http://metrics-service.%s.svc.cluster.local:%s" $namespace $metricsPort }}
        {{- $qdrantHost := printf "metrics-service.%s.svc.cluster.local" $namespace }}
        {{- if and .Values.vectors.env .Values.vectors.env.qdrantUrl }}
        - name: QDRANT_URL
          value: {{ .Values.vectors.env.qdrantUrl | quote }}
        {{- else }}
        - name: QDRANT_URL
          value: {{ $qdrantUrl | quote }}
        {{- end }}
        {{- if and .Values.vectors.env .Values.vectors.env.qdrantHost }}
        - name: QDRANT_HOST
          value: {{ .Values.vectors.env.qdrantHost | quote }}
        {{- else }}
        - name: QDRANT_HOST
          value: {{ $qdrantHost | quote }}
        {{- end }}
        {{- if and .Values.vectors.env .Values.vectors.env.qdrantPort }}
        - name: QDRANT_PORT
          value: {{ .Values.vectors.env.qdrantPort | quote }}
        {{- else }}
        - name: QDRANT_PORT
          value: {{ $metricsPort | toString | quote }}
        {{- end }}
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vectors-service
  namespace: {{ .Values.namespace.name }}
  labels:
    app: myapp
    component: vectors-embedding
    {{- include "vectors-helm.labels" . | nindent 4 }}
spec:
  selector:
    app: myapp
    component: vectors-embedding
  ports:
    - protocol: TCP
      port: {{ .Values.vectors.service.port }}
      targetPort: 8000
      name: http
{{- end }}
