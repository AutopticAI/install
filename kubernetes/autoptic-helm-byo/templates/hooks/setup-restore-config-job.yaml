{{- if and .Values.setup.enabled (not .Values.setup.prepare.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "autoptic-server.fullname" . }}-setup-restore-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
    component: setup-restore-config
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "6"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 1
  activeDeadlineSeconds: {{ .Values.setup.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "autoptic-server.labels" . | nindent 8 }}
        component: setup-restore-config
    spec:
      serviceAccountName: {{ include "autoptic-server.fullname" . }}-setup-restore-sa
      restartPolicy: Never
      containers:
      - name: restore
        image: {{ .Values.setup.applyImage | default "python:3.11-slim" }}
        imagePullPolicy: {{ .Values.setup.applyImagePullPolicy | default "IfNotPresent" }}
        env:
        - name: NAMESPACE
          value: {{ .Values.namespace.name | quote }}
        - name: CONFIGMAP_NAME
          value: {{ include "autoptic-server.configMapName" . | quote }}
        - name: INSTANCE_ID_SECRET_NAME
          value: {{ .Values.setup.instanceIdSecretName | quote }}
        - name: BASE_CONFIG_JSON
          value: {{ include "autoptic-server.configJson" . | quote }}
        - name: INSTANCE_ID
          value: {{ .Values.api.env.instanceId | quote }}
        - name: TENANT_SHORT_NAME
          value: {{ .Values.api.env.tenantShortName | quote }}
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          python3 -m pip install --no-cache-dir --disable-pip-version-check requests
          python3 - <<'PY'
          import base64
          import json
          import os
          import sys
          import requests

          namespace = os.environ["NAMESPACE"]
          configmap_name = os.environ["CONFIGMAP_NAME"]
          instance_secret_name = os.environ["INSTANCE_ID_SECRET_NAME"]
          instance_id = os.environ.get("INSTANCE_ID", "")
          tenant_short_name = os.environ.get("TENANT_SHORT_NAME", "")

          config = json.loads(os.environ["BASE_CONFIG_JSON"])

          host = os.environ.get("KUBERNETES_SERVICE_HOST")
          port = os.environ.get("KUBERNETES_SERVICE_PORT_HTTPS", "443")
          token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

          with open(token_path, "r", encoding="utf-8") as f:
              token = f.read().strip()

          session = requests.Session()
          session.verify = ca_path
          session.headers.update({
              "Authorization": f"Bearer {token}",
              "Accept": "application/json",
              "Content-Type": "application/json",
          })
          timeout = 20
          base = f"https://{host}:{port}/api/v1/namespaces/{namespace}"

          def b64d(s):
              return base64.b64decode(s.encode("utf-8")).decode("utf-8")

          # Prefer values from the persisted Secret so resource names stay stable across reinstalls.
          sec_resp = session.get(f"{base}/secrets/{instance_secret_name}", timeout=timeout)
          if sec_resp.status_code == 200:
              existing = sec_resp.json().get("data", {}) or {}
              if existing.get("instance-id"):
                  instance_id = b64d(existing["instance-id"])
                  print(f"[restore] Using instance ID from Secret: {instance_id}")
              if existing.get("tenant-short-name"):
                  tenant_short_name = b64d(existing["tenant-short-name"])
                  print(f"[restore] Using tenant short name from Secret: {tenant_short_name}")
          else:
              print(f"[restore] Secret {instance_secret_name} not found (status {sec_resp.status_code}), using Helm values")

          if not instance_id:
              print(
                  "[restore] ERROR: instance_id is empty. "
                  "Either the autoptic-instance-id Secret does not exist yet, "
                  "or you must set api.env.instanceId explicitly.",
                  file=sys.stderr,
              )
              sys.exit(1)
          if not tenant_short_name:
              print(
                  "[restore] ERROR: tenant_short_name is empty. "
                  "Either the autoptic-instance-id Secret does not exist yet, "
                  "or you must set api.env.tenantShortName explicitly.",
                  file=sys.stderr,
              )
              sys.exit(1)

          config.setdefault("instance", {})["id"] = instance_id
          config.setdefault("instance", {})["tenant_short_name"] = tenant_short_name
          config_text = json.dumps(config, indent=2) + "\n"

          cm_url = f"{base}/configmaps/{configmap_name}"
          cm_resp = session.get(cm_url, timeout=timeout)
          cm_body = {
              "apiVersion": "v1",
              "kind": "ConfigMap",
              "metadata": {"name": configmap_name, "namespace": namespace},
              "data": {
                  "config.json": config_text,
                  "AUTOPTIC_INSTANCE_ID": instance_id,
                  "AUTOPTIC_TENANT_SHORT_NAME": tenant_short_name,
              },
          }
          if cm_resp.status_code == 404:
              r = session.post(f"{base}/configmaps", data=json.dumps(cm_body), timeout=timeout)
              r.raise_for_status()
              print(f"[restore] Created ConfigMap {configmap_name}")
          elif cm_resp.status_code == 200:
              r = session.put(cm_url, data=json.dumps(cm_body), timeout=timeout)
              r.raise_for_status()
              print(f"[restore] Updated ConfigMap {configmap_name}")
          else:
              cm_resp.raise_for_status()

          print(f"[restore] Done. Instance ID: {instance_id}, Tenant: {tenant_short_name}")
          PY
{{- end }}
