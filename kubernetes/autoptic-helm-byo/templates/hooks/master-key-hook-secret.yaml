{{- if and .Values.ui.enabled .Values.hooks.masterKey.generate (eq .Values.hooks.masterKey.strategy "helmSecret") }}
{{- $secretName := printf "%s-secret" (include "autoptic-ui.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Values.namespace.name $secretName }}
{{- $existingMasterKey := "" }}
{{- if and $existingSecret $existingSecret.data }}
{{- $existingMasterKey = index $existingSecret.data "master-key" | default "" }}
{{- end }}
{{- $generatedMasterKey := (randBytes 32 | b64enc | replace "+" "-" | replace "/" "_") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-ui.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
{{- if .Values.externalSecrets.enabled }}
stringData:
  master-key: {{- if $existingMasterKey }} {{ $existingMasterKey | b64dec | quote }} {{- else }} {{ $generatedMasterKey | quote }} {{- end }}
{{- else }}
stringData:
  webui-secret-key: {{ .Values.ui.secrets.webuiSecretKey | required "ui.secrets.webuiSecretKey is required" | quote }}
  openai-api-key: {{ .Values.ui.secrets.openaiApiKey | required "ui.secrets.openaiApiKey is required" | quote }}
  {{- if .Values.ui.secrets.grokApiKey }}
  grok-api-key: {{ .Values.ui.secrets.grokApiKey | quote }}
  {{- end }}
  master-key: {{- if $existingMasterKey }} {{ $existingMasterKey | b64dec | quote }} {{- else }} {{ $generatedMasterKey | quote }} {{- end }}
{{- end }}
{{- end }}
