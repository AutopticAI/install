{{- if and .Values.setup.enabled .Values.setup.verifySchema.enabled (not .Values.setup.prepare.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "autoptic-server.fullname" . }}-setup-schema
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
    component: setup-schema
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "2"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: {{ .Values.setup.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "autoptic-server.labels" . | nindent 8 }}
        component: setup-schema
    spec:
      serviceAccountName: {{ include "autoptic-server.serviceAccountName" . }}
      restartPolicy: Never
      containers:
      - name: setup-schema
        image: {{ .Values.setup.image }}
        imagePullPolicy: {{ .Values.setup.imagePullPolicy }}
        args:
        - "setup"
        - "--verify-schema"
        - "/server/config.json"
        env:
        {{- include "autoptic-server.awsEnvBlock" . | nindent 8 }}
        volumeMounts:
        - name: config
          mountPath: /server/config.json
          subPath: config.json
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      volumes:
      - name: config
        configMap:
          name: {{ include "autoptic-server.fullname" . }}-schema-config
{{- end }}
