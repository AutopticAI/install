{{- if and .Values.config.enabled (not .Values.config.useExisting) (not .Values.setup.enabled) }}
{{- if not .Values.api.env.instanceId }}
{{- fail "api.env.instanceId is required when setup.enabled=false. Retrieve it with: kubectl get secret autoptic-instance-id -n autoptic -o jsonpath='{.data.instance-id}' | base64 -d" }}
{{- end }}
{{- if not .Values.api.env.tenantShortName }}
{{- fail "api.env.tenantShortName is required when setup.enabled=false. Retrieve it with: kubectl get secret autoptic-instance-id -n autoptic -o jsonpath='{.data.tenant-short-name}' | base64 -d" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "autoptic-server.configMapName" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
data:
  config.json: |
    {{- include "autoptic-server.configJson" . | nindent 4 }}
  {{- with .Values.config.extraData }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
