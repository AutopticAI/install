{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "autoptic-server.fullname" . }}-external-secret
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ .Values.awsSecret.name }}
    creationPolicy: Owner
  data:
  {{- if .Values.externalSecrets.awsAccessKeyIdPath }}
  - secretKey: AWS_ACCESS_KEY_ID
    remoteRef:
      key: {{ .Values.externalSecrets.awsAccessKeyIdPath }}
  {{- end }}
  {{- if .Values.externalSecrets.awsSecretAccessKeyPath }}
  - secretKey: AWS_SECRET_ACCESS_KEY
    remoteRef:
      key: {{ .Values.externalSecrets.awsSecretAccessKeyPath }}
  {{- end }}
  {{- if .Values.externalSecrets.openaiApiKeyPath }}
  - secretKey: OPENAI_API_KEY
    remoteRef:
      key: {{ .Values.externalSecrets.openaiApiKeyPath }}
  {{- end }}
  {{- if .Values.externalSecrets.grokApiKeyPath }}
  - secretKey: GROK_API_KEY
    remoteRef:
      key: {{ .Values.externalSecrets.grokApiKeyPath }}
  {{- end }}
{{- end }}
