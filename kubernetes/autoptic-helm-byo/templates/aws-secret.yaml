{{- if and .Values.awsSecret.enabled (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.awsSecret.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
type: Opaque
data:
  AWS_ACCESS_KEY_ID: {{ .Values.awsSecret.accessKeyId }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.awsSecret.secretAccessKey }}
  {{- if .Values.awsSecret.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.awsSecret.openaiApiKey }}
  {{- end }}
  {{- if .Values.awsSecret.grokApiKey }}
  GROK_API_KEY: {{ .Values.awsSecret.grokApiKey }}
  {{- end }}
{{- end }}
