{{- if and .Values.setup.enabled .Values.setup.verifySchema.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "autoptic-server.fullname" . }}-schema-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
    component: setup-schema
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
data:
  config.json: |
    {{- include "autoptic-server.configJson" . | nindent 4 }}
{{- end }}
