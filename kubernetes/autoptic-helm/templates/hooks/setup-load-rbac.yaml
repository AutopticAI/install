{{- if and .Values.setup.enabled .Values.setup.load.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "autoptic-server.fullname" . }}-setup-load-role
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "autoptic-server.fullname" . }}-setup-load-binding
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "autoptic-server.fullname" . }}-setup-load-role
subjects:
- kind: ServiceAccount
  name: {{ include "autoptic-server.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
{{- end }}
