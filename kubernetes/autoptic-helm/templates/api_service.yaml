{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ default (printf "%s-api" (include "autoptic-server.fullname" .)) .Values.api.service.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.api.labels" . | nindent 4 }}
  {{- with .Values.api.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
  - port: {{ .Values.api.service.port }}
    targetPort: {{ .Values.api.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "autoptic-server.api.selectorLabels" . | nindent 4 }}
{{- end }}
