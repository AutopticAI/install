{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autoptic-server.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "autoptic-server.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "autoptic-server.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "autoptic-server.api.labels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "autoptic-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: api
        image: "{{ .Values.api.image }}"
        imagePullPolicy: {{ .Values.api.imagePullPolicy }}
        args:
          - "api"
          - "-config"
          - "/server/config.json"
        ports:
        - name: http
          containerPort: {{ .Values.api.service.targetPort }}
          protocol: TCP
        env:
        - name: AUTOPTIC_CMD
          value: {{ .Values.api.env.pqlCommand | default "/server/pql" | quote }}
        {{- include "autoptic-server.awsEnvBlock" . | nindent 8 }}
        {{- if .Values.externalSecrets.enabled }}
        {{- if .Values.externalSecrets.openaiApiKeyPath }}
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.awsSecret.name }}
              key: OPENAI_API_KEY
        {{- end }}
        {{- if .Values.externalSecrets.grokApiKeyPath }}
        - name: GROK_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.awsSecret.name }}
              key: GROK_API_KEY
        {{- end }}
        {{- end }}
        {{- include "autoptic-server.instanceEnvBlock" . | nindent 8 }}
        volumeMounts:
        - name: config
          mountPath: /server/config.json
          subPath: config.json
          readOnly: true
        {{- with .Values.api.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.api.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "autoptic-server.configMapName" . }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
