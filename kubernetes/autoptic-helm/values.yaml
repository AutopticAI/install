# Default values for autoptic-helm-prod.
# This is a merged configuration from autoptic-server, autoptic-ui, and vectors-helm charts.

# Namespace configuration
namespace:
  create: true
  name: autoptic
  labels: {}
  annotations: {}

# Global settings
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Shared security contexts
podSecurityContext:
  runAsNonRoot: false

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# ============================================
# API Server Configuration
# ============================================
api:
  enabled: true
  image: autoptic/server:latest
  imagePullPolicy: Always
  replicas: 1

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  env:
    awsRegion: "replace-me-region"
    uiAddress: http://ui-service.autoptic.svc.cluster.local:8080
    serverPort: "9999"
    # instanceId and tenantShortName are auto-generated by setup.prepare hook when enabled
    # Set these explicitly only when setup.prepare.enabled=false
    instanceId: ""
    tenantShortName: ""
    pqlCommand: /server/pql
    logLevel: info

  service:
    name: api-service
    type: ClusterIP
    port: 9999
    targetPort: 9999
    annotations: {}

  livenessProbe:
    httpGet:
      path: /health
      port: 9999
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 9999
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================
# Scheduler Configuration
# ============================================
scheduler:
  enabled: true
  image: autoptic/server:latest
  imagePullPolicy: Always
  replicas: 1

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  env:
    awsRegion: "replace-me-region"
    apiEndpoint: http://api-service.autoptic.svc.cluster.local:9999/story/ep/default
    apiToken: ""
    refreshInterval: 300s
    timeout: 180s
    logLevel: info

  waitForApi:
    enabled: false
    timeout: 300
    initialDelaySeconds: 10

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================
# ConfigMap Configuration
# ============================================
config:
  enabled: true
  name: autoptic-config
  useExisting: false
  configJson: {}
  # configJsonString: |
  #   { "server": {"port": "9999"} }
  extraData:
    AUTOPTIC_INSTANCE_ID: "replace-me-instance-id"
    AUTOPTIC_TENANT_SHORT_NAME: "replace-me-tenant"

# ============================================
# UI Configuration
# ============================================
ui:
  enabled: true
  image: autoptic/ui:latest
  imagePullPolicy: Always
  replicas: 1

  secrets:
    webuiSecretKey: ""
    openaiApiKey: ""
    grokApiKey: ""
    googleClientSecret: ""
    oktaClientSecret: ""

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  env:
    AUTOPTIC_SERVER_URL: http://api-service.autoptic.svc.cluster.local:9999/
    openaiBaseUrl: http://api-service.autoptic.svc.cluster.local:9999/v1
    vectorDb: qdrant
    qdrantUri: http://metrics-service.autoptic.svc.cluster.local:6334
    ragEmbeddingEngine: openai
    ragEmbeddingModel: e5-large-v2
    ragEmbeddingModelTrustRemoteCode: "true"
    enableRagWebSearch: "true"
    enableRagLocalWebFetch: "false"
    ragWebSearchEngine: searxng
    enableSignup: "true"
    webuiAuth: "true"
    defaultUserRole: admin
    defaultEnvironment: default
    defaultSecret: default
    authTokenExpiresIn: "1800"
    sessionCookieExpiresIn: "1800"
    googleClientId: ""
    googleRedirectUri: ""
    oktaClientId: ""
    oktaRedirectUri: ""
    oktaDomain: ""

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/proxy-body-size: "20m"
      nginx.ingress.kubernetes.io/rewrite-target: /
      kubernetes.io/ingress.class: nginx
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt
    hosts:
      - host: "ui.example.com"
        paths:
          - path: /
            pathType: Prefix
    tls: []

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 2Gi
    mountPath: /app/backend/data

  # Gateway API configuration (HTTPRoute only - assumes existing Gateway)
  gateway:
    enabled: true
    parentRefs:
      - name: "replace-me-gateway"
        namespace: "replace-me-gateway-namespace"
    hostnames:
      - "ui.example.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: / 
    annotations: {}

# ============================================
# Metrics (Qdrant) Configuration
# ============================================
metrics:
  enabled: true
  image: autoptic/metrics:latest
  replicas: 1

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  service:
    ports:
      http: 6333
      grpc: 6334

  persistence:
    enabled: true
    size: "20Gi"
    storageClass: ""
    accessMode: ReadWriteOnce
    annotations: {}
    volumeName: ""
    selector: {}

  securityContext:
    fsGroup: 1000
    runAsUser: 1000

  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# ============================================
# Vectors Configuration
# ============================================
vectors:
  enabled: true
  image: autoptic/vectors:latest
  replicas: 1

  resources:
    requests:
      memory: "1024Mi"
      cpu: "1000m"
    limits:
      memory: "1024Mi"
      cpu: "1000m"

  service:
    port: 8000

  env:
    qdrantUrl: ""
    qdrantHost: ""
    qdrantPort: ""

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# ============================================
# Service Account Configuration
# ============================================
serviceAccounts:
  s3DynamoDbAccess:
    create: false
    name: s3-dynamodb-access
    roleArn: ""
    annotations: {}

# ============================================
# AWS Secret Configuration
# ============================================
awsSecret:
  enabled: false
  name: aws-credentials
  accessKeyId: ""
  secretAccessKey: ""
  openaiApiKey: ""
  grokApiKey: ""

# ============================================
# External Secrets Configuration
# ============================================
externalSecrets:
  enabled: false
  secretStoreName: "replace-me-secret-store"
  secretStoreKind: SecretStore
  awsAccessKeyIdPath: "replace-me/aws-access-key-id"
  awsSecretAccessKeyPath: "replace-me/aws-secret-access-key"
  openaiApiKeyPath: "replace-me/openai-api-key"
  grokApiKeyPath: "replace-me/grok-api-key"
  webuiSecretKeyPath: "replace-me/webui-secret-key"
  googleClientSecretPath: ""
  oktaClientSecretPath: ""

# ============================================
# Helm Hooks Configuration
# ============================================
hooks:
  masterKey:
    generate: true
    strategy: pythonJob
    image: "python:3.11-slim"
    activeDeadlineSeconds: 180

# ============================================
# Setup Hooks Configuration
# Replaces docker-compose steps 3/5/6 for automated bootstrap
# ============================================
setup:
  enabled: true
  tenantShortName: "replace-me-tenant"
  image: autoptic/server:latest
  imagePullPolicy: Always
  kubectlImage: registry.k8s.io/kubectl:v1.30.0
  instanceIdSecretName: autoptic-instance-id
  activeDeadlineSeconds: 600
  prepare:
    enabled: true
  run:
    enabled: true
  load:
    enabled: true

# ============================================
# PQL Storage Configuration (prod-specific)
# ============================================
pql:
  storage:
    enabled: true
    pvcName: "replace-me-pql-pvc"
    pvName: "replace-me-pql-pv"
    size: 1Gi
    accessModes:
      - ReadWriteMany
    storageClassName: ""
    hostPath: /tmp/pql-aws-storage
    createHostPath: true
    hostPathMode: "0770"
    setHostPathOwner: false
    hostPathOwnerUser: "0"
    hostPathOwnerGroup: "0"

# ============================================
# Legacy/Unused values (kept for compatibility)
# ============================================
image:
  repository: nginx
  pullPolicy: Always
  tag: ""

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
